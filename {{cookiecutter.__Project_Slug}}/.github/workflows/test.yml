name: Test

on:
  push:
    branches: [ main ]
    paths:
{%- if cookiecutter.create_package == "true" %}
      - 'src/**'
{%- endif %}
      - 'tools/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
{%- if cookiecutter.r_ver != "none" %}
      - '**/*.R'
      - 'renv.lock'
{%- endif %}
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python {% raw %}${{ matrix.python-version }}{% endraw %} on {% raw %}${{ matrix.os }}{% endraw %}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["{{ cookiecutter.python_ver }}"]

    runs-on: {% raw %}${{ matrix.os }}{% endraw %}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Python {% raw %}${{ matrix.python-version }}{% endraw %}
        uses: actions/setup-python@v5
        with:
          python-version: {% raw %}${{ matrix.python-version }}{% endraw %}
          cache: 'poetry'

      - name: Install dependencies
{%- if cookiecutter.create_package == "true" %}
        run: poetry install --with dev --no-interaction
{%- else %}
        run: poetry install --with dev --no-interaction --no-root
{%- endif %}

{%- if cookiecutter.r_ver != "none" %}
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '{{ cookiecutter.r_ver }}'

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev libcurl4-openssl-dev libssl-dev \
            libzmq3-dev libuv1-dev libglpk-dev \
            libharfbuzz-dev libfribidi-dev libfontconfig1-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            pandoc

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
{%- endif %}

      - name: Run pre-commit hooks
        run: poetry run pre-commit run --all-files

      - name: Run Tests (Pytest)
        run: poetry run pytest
{%- if cookiecutter.r_ver != "none" %}

      - name: Run R Tests
        if: {% raw %}${{ hashFiles('renv.lock') != '' }}{% endraw %}
        run: poetry run Rscript -e "if (requireNamespace('testthat', quietly = TRUE)) testthat::test_dir('tests/testthat')"
{%- endif %}
