name: Test

on:
  push:
    branches: [ main ]
    paths:
      - 'environment.yml'
{%- if cookiecutter.create_package == "true" %}
      - 'src/**'
{%- endif %}
      - 'tools/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
{%- if cookiecutter.r_ver != "none" %}
      - '**/*.R'
      - 'renv.lock'
{%- endif %}
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: conda_{{cookiecutter.__project_slug}}
          environment-file: environment.yml
          python-version: {{cookiecutter.python_ver}}
          auto-activate-base: false
          use-mamba: true
{% raw %}
          cache-environment: true
          cache-environment-key: conda-env-${{ runner.os }}-${{ hashFiles('environment.yml') }}
{% endraw %}

      - name: Install dependencies
        run: |
          conda run -n conda_{{cookiecutter.__project_slug}} poetry config virtualenvs.create false
{%- if cookiecutter.create_package == "true" %}
          conda run -n conda_{{cookiecutter.__project_slug}} poetry install --with dev --no-interaction
{%- else %}
          conda run -n conda_{{cookiecutter.__project_slug}} poetry install --with dev --no-interaction --no-root
{%- endif %}

{%- if cookiecutter.r_ver != "none" %}
{% raw %}
      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/renv
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            renv-${{ runner.os }}-
{% endraw %}
      - name: Set up renv
        run: make setup-r
{%- endif %}

      - name: Run pre-commit hooks
        run: conda run -n conda_{{cookiecutter.__project_slug}} poetry run pre-commit run --all-files

      - name: Run Tests
        run: make test
